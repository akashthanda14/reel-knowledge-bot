# docker-compose.yml — Reel Knowledge Bot (3-container architecture)
#
# Container 1: redis   — job queue and result store
# Container 2: bot     — Telegram listener, pushes jobs, reads results
# Container 3: agent   — pops jobs, runs pipeline, pushes results
#
#  User → Telegram → [bot] → Redis jobs:pending → [agent] → Redis result:{id} → [bot] → User

version: "3.9"

services:

  # ── Container 1: Redis ───────────────────────────────────────────────────────
  # Redis is an in-memory data store used here as a job queue.
  # bot.py writes to it; agent.py reads from it; agent.py writes results back;
  # bot.py reads results. No direct connection exists between bot and agent.
  redis:
    # Use the official Redis image, Alpine variant.
    # Alpine Linux is a minimal OS (~5MB) that keeps the image small.
    # "7" pins to Redis major version 7 — gets patch updates automatically.
    image: redis:7-alpine

    # Restart automatically if Redis crashes or the machine reboots.
    restart: unless-stopped

    # healthcheck lets other services use `condition: service_healthy`
    # in their depends_on block so they don't start before Redis is ready.
    # test: run `redis-cli ping` inside the container; healthy = it returns PONG.
    # interval: run the check every 5 seconds.
    # timeout: fail the check if it takes longer than 3 seconds.
    # retries: mark unhealthy after 5 consecutive failures.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    # Persist Redis data to a named volume.
    # Without this, all queued jobs and results vanish if the container restarts.
    # Redis appends writes to /data/appendonly.aof (if persistence is enabled)
    # or takes snapshots to /data/dump.rdb.
    volumes:
      - redis_data:/data

  # ── Container 2: bot ─────────────────────────────────────────────────────────
  # The Telegram-facing service. Receives reel links, pushes jobs to Redis,
  # waits for results, and replies to the user.
  bot:
    # Build the image from the Dockerfile in the current directory.
    # Both bot and agent use this same image — same Python environment,
    # same installed packages, same source code.
    build: .

    # Override the Dockerfile's default CMD so the intent is explicit.
    command: python bot.py

    # Load API keys and tokens from .env into the container's environment.
    # .env is in .dockerignore — it is never copied into the image itself.
    env_file:
      - .env

    # Inject the Redis URL as an environment variable.
    # "redis" resolves to the Redis container's hostname on Docker's internal
    # network. Compose creates a private network and assigns each service's
    # name as its DNS hostname automatically.
    # This variable is defined here (not in .env) because it's infrastructure
    # config, not a secret — it changes depending on the deployment environment.
    environment:
      REDIS_URL: redis://redis:6379

    # Don't start the bot until Redis passes its healthcheck.
    # Without this, bot.py would try to connect to Redis before it's ready
    # and crash immediately.
    depends_on:
      redis:
        condition: service_healthy

    # Restart on crash or reboot — this is a long-running daemon.
    restart: unless-stopped

    # Named volume for temporary audio files.
    # yt-dlp downloads audio here; Whisper reads and deletes it.
    volumes:
      - audio_tmp:/tmp/reels

  # ── Container 3: agent ───────────────────────────────────────────────────────
  # The processing worker. Blocks on the Redis job queue, runs the full
  # download → transcribe → classify → save pipeline for each job,
  # and pushes the result back to Redis for the bot to read.
  agent:
    # Same image as bot — the Dockerfile is built once and shared.
    build: .

    # agent.py's __main__ now runs the worker loop, not the CLI prompt.
    command: python agent.py

    # Same .env file — agent needs OPENAI_API_KEY, NOTION_TOKEN,
    # NOTION_DATABASE_ID to run the pipeline.
    env_file:
      - .env

    # Same Redis URL — agent reads from jobs:pending and writes to result:{id}.
    environment:
      REDIS_URL: redis://redis:6379

    # Agent also waits for Redis to be healthy before starting.
    depends_on:
      redis:
        condition: service_healthy

    # Restart automatically — if a job causes an unhandled exception that
    # escapes the worker loop, the container restarts and picks up the next job.
    restart: unless-stopped

    # Same named volume — audio files written by yt-dlp and read by Whisper
    # live here. Survives container restarts mid-download.
    volumes:
      - audio_tmp:/tmp/reels

# ── Named volumes ─────────────────────────────────────────────────────────────
# Declared here so Docker manages them as first-class objects.
# They persist across `docker compose down` (but not `docker compose down --volumes`).
volumes:
  # Redis persistence — keeps queued jobs and results across Redis restarts.
  redis_data:

  # Shared audio temp storage — used by both bot and agent containers.
  audio_tmp:
